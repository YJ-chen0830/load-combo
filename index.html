<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>載重組合計算</title>
<style>
  :root{--navy:#0b1f3a;--navy2:#13284a;--gold:#c9a14a;--gold2:#e0bf6e;--bg:#f5f3ee;--ink:#1c2530;--line:#d8d2c2;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Noto Sans TC","Segoe UI",sans-serif;background:var(--bg);color:var(--ink);}
  header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#f5f3ee;padding:28px 32px;}
  header h1{margin:0;font-size:22px;}
  header span{color:var(--gold2);font-size:13px;display:block;margin-top:4px;}
  main{max-width:980px;margin:0 auto;padding:28px 20px 60px;}
  .grid{display:grid;grid-template-columns:320px 1fr;gap:24px;}
  @media(max-width:800px){.grid{grid-template-columns:1fr;}}
  .card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:20px 22px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .card h2{font-size:15px;margin:0 0 14px;color:var(--navy);border-bottom:2px solid var(--gold);padding-bottom:8px;}
  label{display:block;font-size:12.5px;color:#555;margin:10px 0 4px;}
  input{width:100%;padding:8px 10px;border:1px solid #ccc;border-radius:6px;font-size:14px;background:#fafaf8;}
  button{margin-top:16px;width:100%;padding:11px;border:none;border-radius:7px;background:var(--navy);color:#fff;font-size:15px;font-weight:600;cursor:pointer;}
  button:hover{background:var(--navy2);}
  table{width:100%;border-collapse:collapse;margin-top:4px;}
  td,th{padding:7px 8px;border-bottom:1px solid #eee;font-size:13px;}
  th{background:#f5f3ee;font-weight:600;color:var(--navy);font-size:12px;text-align:left;}
  td:last-child{text-align:right;font-weight:700;font-size:14px;}
  tr.max-row{background:#fff8e6;}
  tr.max-row td{color:#8a5e00;}
  tr.max-row td:last-child{color:var(--navy);font-size:15px;}
  .note{font-size:12px;color:#888;margin-top:12px;line-height:1.7;}
  .section{font-size:13px;font-weight:700;color:var(--navy);margin:12px 0 4px;padding-left:8px;border-left:3px solid var(--gold);}
  details.proc{margin-top:14px;border:1px solid var(--line);border-radius:8px;background:#fafaf8;}
  details.proc summary{cursor:pointer;padding:10px 14px;font-weight:700;font-size:13px;color:var(--navy);user-select:none;}
  details.proc pre{margin:0;padding:10px 16px 14px;font-family:"Courier New",monospace;font-size:11.5px;line-height:1.85;white-space:pre-wrap;color:#2c3e50;border-top:1px solid var(--line);}
  .proj-section{background:#fff;border:1px solid var(--gold);border-radius:10px;padding:18px 22px;margin-bottom:20px;}
  .proj-section h3{margin:0 0 12px;color:var(--navy);font-size:14px;font-weight:700;}
  .proj-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media(max-width:600px){.proj-grid{grid-template-columns:1fr;}}
</style>
<script src="https://yj-chen0830.github.io/jrh-core/jrh-core.js?v=3" defer></script>
</head>
<body data-tool="lc">
<header>
  <a href="https://yj-chen0830.github.io/engineering-hub/" style="color:var(--gold2);font-size:12.5px;text-decoration:none;display:inline-block;margin-bottom:8px;">← 返回工程計算中心</a>
  <h1>載重組合計算器 (LRFD Load Combinations)</h1>
  <span>ACI 318-19 §5.3 · 8 組 LRFD + 9 組 ASD · 自動標示控制組合</span>
</header>
<main>

<div class="proj-section no-print" id="projSection">
  <h3>📁 專案資訊（列印時帶入計算書封面）</h3>
  <div class="proj-grid">
    <div><label>工程名稱</label><input id="pj-name" placeholder="○○工程"></div>
    <div><label>工程地點</label><input id="pj-loc" placeholder="○○市○○區"></div>
    <div><label>承造廠商</label><input id="pj-contractor" placeholder="○○營造股份有限公司"></div>
    <div><label>文件編號</label><input id="pj-docno" placeholder="LC-CAL-001"></div>
    <div><label>計算者</label><input id="pj-calc" placeholder="姓名"></div>
    <div><label>審核者</label><input id="pj-review" placeholder="姓名"></div>
    <div><label>計算日期</label><input id="pj-date" type="date"></div>
  </div>
</div>

<div class="grid">
  <div class="card">
    <h2>輸入載重（kN 或 kN·m）</h2>
    <div class="section">重力載重</div>
    <label>D 靜載重</label><input id="D" type="number" value="100" step="1">
    <label>L 活載重</label><input id="L" type="number" value="80" step="1">
    <label>Lr 屋頂活載重</label><input id="Lr" type="number" value="20" step="1">
    <label>S 雪載重</label><input id="S" type="number" value="0" step="1">
    <label>R 雨水載重</label><input id="R" type="number" value="0" step="1">
    <div class="section">側向載重</div>
    <label>W 風力</label><input id="W" type="number" value="50" step="1">
    <label>E 地震力</label><input id="E" type="number" value="80" step="1">
    <div class="section">其他</div>
    <label>F 液體壓力</label><input id="F" type="number" value="0" step="1">
    <label>H 土壓力</label><input id="H" type="number" value="0" step="1">
    <div class="section">本次組合類別</div>
    <label>本次輸入的載重代表哪種內力？（供跨工具帶入時標示用途，避免誤用）</label>
    <select id="lc-type">
      <option value="">－未指定－</option>
      <option value="P">軸力 P</option>
      <option value="M">彎矩 M</option>
      <option value="V">剪力 V</option>
    </select>
    <button onclick="calc()">計算所有組合</button>
    <div class="note">控制組合（最大值）以金色背景★標示。</div>
  </div>
  <div class="card">
    <h2>載重組合結果</h2>
    <div id="result"><p style="color:#888">尚未計算</p></div>
    <details class="proc" id="proc-box" style="display:none">
      <summary>📋 計算過程（供第三方檢核）</summary>
      <pre id="proc-text"></pre>
    </details>
  </div>
</div>
</main>
<script>
function calc(){
  const D=+document.getElementById('D').value;
  const L=+document.getElementById('L').value;
  const Lr=+document.getElementById('Lr').value;
  const S=+document.getElementById('S').value;
  const R=+document.getElementById('R').value;
  const W=+document.getElementById('W').value;
  const E=+document.getElementById('E').value;
  const F=+document.getElementById('F').value;
  const H=+document.getElementById('H').value;

  const mLrSR=Math.max(Lr,S,R);
  const mLrS=Math.max(Lr,S);

  const combos=[
    {name:'U1',formula:'1.4D + 1.4F',                              val:1.4*D+1.4*F,
     detail:`1.4×${D} + 1.4×${F} = ${(1.4*D).toFixed(2)} + ${(1.4*F).toFixed(2)}`},
    {name:'U2',formula:'1.2D + 1.6L + 1.6F + 0.5(Lr/S/R)',       val:1.2*D+1.6*L+1.6*F+0.5*mLrSR,
     detail:`1.2×${D}+1.6×${L}+1.6×${F}+0.5×max(${Lr},${S},${R})\n     =${(1.2*D).toFixed(2)}+${(1.6*L).toFixed(2)}+${(1.6*F).toFixed(2)}+${(0.5*mLrSR).toFixed(2)}`},
    {name:'U3',formula:'1.2D + 1.6(Lr/S/R) + max(L, 0.5W)',       val:1.2*D+1.6*mLrSR+Math.max(L,0.5*W),
     detail:`1.2×${D}+1.6×${mLrSR}+max(${L}, 0.5×${W})\n     =${(1.2*D).toFixed(2)}+${(1.6*mLrSR).toFixed(2)}+${Math.max(L,0.5*W).toFixed(2)}`},
    {name:'U4',formula:'1.2D + 1.0W + 1.0L + 0.5(Lr/S/R)',        val:1.2*D+W+L+0.5*mLrSR,
     detail:`1.2×${D}+1.0×${W}+1.0×${L}+0.5×${mLrSR}\n     =${(1.2*D).toFixed(2)}+${W}+${L}+${(0.5*mLrSR).toFixed(2)}`},
    {name:'U5',formula:'0.9D + 1.0W + 1.6H',                       val:0.9*D+W+1.6*H,
     detail:`0.9×${D}+1.0×${W}+1.6×${H}\n     =${(0.9*D).toFixed(2)}+${W}+${(1.6*H).toFixed(2)}`},
    {name:'U6',formula:'1.2D + 1.0E + 1.0L + 0.2S',               val:1.2*D+E+L+0.2*S,
     detail:`1.2×${D}+1.0×${E}+1.0×${L}+0.2×${S}\n     =${(1.2*D).toFixed(2)}+${E}+${L}+${(0.2*S).toFixed(2)}`},
    {name:'U7',formula:'0.9D + 1.0E + 1.6H',                       val:0.9*D+E+1.6*H,
     detail:`0.9×${D}+1.0×${E}+1.6×${H}\n     =${(0.9*D).toFixed(2)}+${E}+${(1.6*H).toFixed(2)}`},
    {name:'U8',formula:'1.2D + 1.6L + 1.6H + 0.5(Lr/S)',           val:1.2*D+1.6*L+1.6*H+0.5*mLrS,
     detail:`1.2×${D}+1.6×${L}+1.6×${H}+0.5×max(${Lr},${S})\n     =${(1.2*D).toFixed(2)}+${(1.6*L).toFixed(2)}+${(1.6*H).toFixed(2)}+${(0.5*mLrS).toFixed(2)}`},
  ];

  const asdCombos=[
    {name:'ASD1',formula:'D',                                        val:D},
    {name:'ASD2',formula:'D + L',                                    val:D+L},
    {name:'ASD3',formula:'D + Lr(or S or R)',                        val:D+mLrSR},
    {name:'ASD4',formula:'D + 0.75L + 0.75(Lr/S/R)',                val:D+0.75*L+0.75*mLrSR},
    {name:'ASD5',formula:'D ± 0.6W',                                 val:D+0.6*W},
    {name:'ASD6',formula:'D + 0.7E',                                 val:D+0.7*E},
    {name:'ASD7',formula:'D + 0.75×0.7E + 0.75L + 0.75S',           val:D+0.75*0.7*E+0.75*L+0.75*S},
    {name:'ASD8',formula:'0.6D ± 0.6W',                              val:0.6*D+0.6*W},
    {name:'ASD9',formula:'0.6D + 0.7E',                              val:0.6*D+0.7*E},
  ];

  const maxLRFD=Math.max(...combos.map(c=>c.val));
  const maxASD=Math.max(...asdCombos.map(c=>c.val));

  let html=`<p style="font-size:12.5px;color:#888;margin:0 0 8px">LRFD 最大：<strong style="color:var(--navy);font-size:15px">${maxLRFD.toFixed(2)}</strong></p>`;
  html+='<table><tr><th>組合</th><th>公式</th><th>計算值</th></tr>';
  combos.forEach(c=>{
    const isMax=Math.abs(c.val-maxLRFD)<0.001;
    html+=`<tr${isMax?' class="max-row"':''}><td>${c.name}${isMax?' ★':''}</td>
      <td style="font-size:12px;color:#555">${c.formula}</td><td>${c.val.toFixed(2)}</td></tr>`;
  });
  html+='</table>';
  html+=`<p style="font-size:12.5px;color:#888;margin:16px 0 8px">ASD 最大：<strong style="color:var(--navy)">${maxASD.toFixed(2)}</strong></p>`;
  html+='<table><tr><th>組合</th><th>公式</th><th>計算值</th></tr>';
  asdCombos.forEach(c=>{
    const isMax=Math.abs(c.val-maxASD)<0.001;
    html+=`<tr${isMax?' class="max-row"':''}><td>${c.name}${isMax?' ★':''}</td>
      <td style="font-size:12px;color:#555">${c.formula}</td><td>${c.val.toFixed(2)}</td></tr>`;
  });
  html+='</table>';
  document.getElementById('result').innerHTML=html;

  if(window.JRH && JRH.saveOutput){
    const lcType=document.getElementById('lc-type').value;
    if(lcType){
      JRH.saveOutput({value_LRFD:maxLRFD, value_ASD:maxASD, type:lcType});
    }
  }

  // Process
  let proc=`════════════════════════════════════════
載重組合計算過程
規範依據：ACI 318-19 §5.3.1（LRFD）
════════════════════════════════════════

【一、輸入載重值】
  D  靜載重         = ${D}
  L  活載重         = ${L}
  Lr 屋頂活載重     = ${Lr}
  S  雪載重         = ${S}
  R  雨水載重       = ${R}
  W  風力           = ${W}
  E  地震力         = ${E}
  F  液體壓力       = ${F}
  H  土壓力         = ${H}

  中間值：
  max(Lr, S, R)     = max(${Lr}, ${S}, ${R}) = ${mLrSR}
  max(Lr, S)        = max(${Lr}, ${S}) = ${mLrS}
  max(L, 0.5W)      = max(${L}, ${(0.5*W).toFixed(1)}) = ${Math.max(L,0.5*W).toFixed(1)}

【二、LRFD 各組合計算（ACI 318-19 §5.3.1）】\n`;

  combos.forEach(c=>{
    proc+=`  ${c.name}：${c.formula}\n`;
    proc+=`     = ${c.detail}\n`;
    proc+=`     = ${c.val.toFixed(3)}${Math.abs(c.val-maxLRFD)<0.001?' ← 控制組合★':''}\n\n`;
  });

  proc+=`  LRFD 控制值 = ${maxLRFD.toFixed(3)}\n\n`;
  proc+=`【三、ASD 各組合計算（ASCE 7 §2.4）】\n`;

  asdCombos.forEach(c=>{
    proc+=`  ${c.name}：${c.formula} = ${c.val.toFixed(3)}${Math.abs(c.val-maxASD)<0.001?' ← 控制★':''}\n`;
  });
  proc+=`\n  ASD 控制值 = ${maxASD.toFixed(3)}`;

  document.getElementById('proc-text').textContent=proc;
  document.getElementById('proc-box').style.display='';
}
window.onload=calc;
</script>
<div class="no-print" style="max-width:1100px;margin:10px auto 40px;padding:0 20px;"><button type="button" onclick="JRH.checkEmail(function(){jrhPrint('載重組合計算書');})" style="width:100%;padding:13px;border:none;border-radius:8px;background:#c9a14a;color:#0b1f3a;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;">📄 產出計算書 PDF</button></div>
<style>@media print{.no-print{display:none!important}}</style>
</body>
</html>
